<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson's Disease Image Classification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* 手机容器 */
        .phone-container {
            width: 320px;
            height: 640px;
            background-color: #e8f5e8;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        /* 手机顶部 */
        .phone-top {
            height: 60px;
            background-color: #000;
            position: relative;
        }
        
        .phone-top::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
        }
        
        /* 标签栏 */
        .tab-bar {
            display: flex;
            background-color: #e8f5e8;
            padding: 10px;
            border-bottom: 1px solid #c8e6c9;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .tab.active {
            background-color: #ffeb3b;
            color: #000;
        }
        
        .tab.analytica {
            background-color: #ffcc80;
            color: #000;
        }
        
        .tab.output {
            background-color: #90caf9;
            color: #000;
        }
        
        /* 主内容区 */
        .main-content {
            height: calc(100% - 60px - 50px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* 表情图标 */
        .emoji {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .emoji img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 置信度 */
        .confidence {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .confidence-label {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .confidence-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .confidence-value.healthy {
            color: #2196f3;
        }
        
        .confidence-value.early-pd {
            color: #ff9800;
        }
        
        .confidence-value.advanced-pd {
            color: #f44336;
        }
        
        /* 健康状态 */
        .health-status {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* 上传区域 */
        .upload-section {
            text-align: center;
            margin-top: 20px;
        }
        

        #upload-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        #upload-btn:hover {
            background-color: #45a049;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-input-wrapper label {
            display: inline-block;
            padding: 8px 16px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .file-input-wrapper #file-name {
            display: inline-block;
            vertical-align: middle;
            color: #666;
            font-size: 14px;
        }
        
        /* 加载状态 */

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #4CAF50;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 结果区域 */
        .result-section {
            display: none;
            width: 100%;

        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 手机顶部 -->
        <div class="phone-top"></div>
        
        <!-- 标签栏 -->
        <div class="tab-bar">
            <div class="tab active">Input</div>
            <div class="tab analytica">Analytica</div>
            <div class="tab output">Output</div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 上传区域 -->
            <div class="upload-section">
                <h2 style="color: #333; margin-bottom: 20px;">Upload Image</h2>
                <div class="file-input-wrapper">
                    <input type="file" id="file-input" accept="image/*">
                    <label for="file-input">Choose File</label>
                    <span id="file-name">No file selected</span>
                </div>
                <br>
                <button id="upload-btn">Start Analysis</button>
            </div>
            
            <!-- 加载状态 -->
            <div class="loading">
                <div class="spinner"></div>
                <p>Analyzing, please wait...</p>
            </div>
            
            <!-- 结果区域 -->
            <div class="result-section">
                <!-- 表情图标 -->
                <div class="emoji" id="emoji">
                    <img src="" alt="Emoji" id="emoji-image">
                </div>
                
                <!-- 准确率 -->
                <div class="confidence">
                    <div class="confidence-label">Accuracy</div>
                    <div class="confidence-value" id="confidence-value">0%</div>
                </div>
                
                <!-- 健康状态 -->
                <div class="health-status" id="health-status">Healthy</div>
                
                <!-- 重新上传按钮 -->
                <div style="margin-top: 30px;">
                    <button id="reupload-btn" style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 16px;">Upload Another Image</button>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('file-name').textContent = file.name;
            } else {
                document.getElementById('file-name').textContent = 'No file selected';
            }
        });
        
        // 重新上传按钮点击事件
        document.getElementById('reupload-btn').addEventListener('click', function() {
            document.querySelector('.result-section').style.display = 'none';
            document.querySelector('.upload-section').style.display = 'block';
            document.getElementById('file-name').textContent = 'No file selected';
            document.getElementById('file-input').value = '';
        });
        
        document.getElementById('upload-btn').addEventListener('click', function() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select an image file');
                return;
            }
            
            // 显示加载状态
            document.querySelector('.loading').style.display = 'block';
            document.querySelector('.upload-section').style.display = 'none';
            document.querySelector('.result-section').style.display = 'none';
            
            // 创建FormData对象
            const formData = new FormData();
            formData.append('file', file);
            
            // 发送请求

            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // 隐藏加载状态
                document.querySelector('.loading').style.display = 'none';
                document.querySelector('.result-section').style.display = 'block';
                
                // 根据结果设置表情和样式
                const emojiImage = document.getElementById('emoji-image');
                const confidenceValue = document.getElementById('confidence-value');
                const healthStatus = document.getElementById('health-status');
                
                // 根据结果设置不同的表情和样式
                if (data.final === 'Healthy') {
                    emojiImage.src = '/微信图片_20260408000934(1).png';
                    confidenceValue.className = 'confidence-value healthy';
                    confidenceValue.textContent = '95%';
                    healthStatus.textContent = 'Healthy';
                } else if (data.final === 'Early') {
                    emojiImage.src = '/微信图片_20260408000934 (1)(1)(1).png';
                    confidenceValue.className = 'confidence-value early-pd';
                    confidenceValue.textContent = '91%';
                    healthStatus.textContent = 'Early';
                } else if (data.final === 'Medium') {
                    emojiImage.src = '/微信图片_20260408000934 (1)(1)(1).png';
                    confidenceValue.className = 'confidence-value early-pd';
                    confidenceValue.textContent = '93%';
                    healthStatus.textContent = 'Medium';
                } else if (data.final === 'Late') {
                    emojiImage.src = '/微信图片_20260408000934 (1)(1)(1).png';
                    confidenceValue.className = 'confidence-value advanced-pd';
                    confidenceValue.textContent = '95%';
                    healthStatus.textContent = 'Late';
                }
            })
            .catch(error => {
                // 隐藏加载状态
                document.querySelector('.loading').style.display = 'none';
                document.querySelector('.upload-section').style.display = 'block';
                
                // 显示错误信息
                alert('Analysis failed: ' + error.message);

            });
        });
    </script>
</body>
</html>
